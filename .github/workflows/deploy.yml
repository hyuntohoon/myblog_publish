name: Deploy Publisher Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        # exit 5 = no tests collected; treat as pass until unit tests are added
        run: pytest tests/ -m "not integration" || [ $? -eq 5 ]

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build zip
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build --platform manylinux2014_aarch64 --only-binary=:all:
          cp -r app build/
          find build -name "__pycache__" -type d -exec rm -rf {} +
          find build -name "*.pyc" -delete
          cd build && zip -r ../bundle.zip . && cd -
          ls -lh bundle.zip

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'myblogPublishLambda' }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://bundle.zip \
            --architectures arm64
