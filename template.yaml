AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Static site publisher on Lambda (FastAPI + Mangum, no DB)

Parameters:
  FrontOrigin:
    Type: String
    Default: https://www.ratemymusic.blog

  SecretsArn:
    Type: String
    Default: ""
    # JSON keys: GITHUB_TOKEN, EDGE_SECRET

  GitHubRepoOwner:
    Type: String
    Default: hyuntohoon

  GitHubRepoName:
    Type: String
    Default: myblog_front

  GitHubRepoBranch:
    Type: String
    Default: main

  ContentDir:
    Type: String
    Default: content/blog

  LogRetentionInDays:
    Type: Number
    Default: 14

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        APP_ENV: prod
        FRONT_ORIGIN: !Ref FrontOrigin
        GITHUB_REPO_OWNER: !Ref GitHubRepoOwner
        GITHUB_REPO_NAME: !Ref GitHubRepoName
        GITHUB_REPO_BRANCH: !Ref GitHubRepoBranch
        CONTENT_DIR: !Ref ContentDir
        SECRETS_ARN: !Ref SecretsArn

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - x-origin-verify
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.main.handler
      Events:
        AnyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            PayloadFormatVersion: "2.0"
      # No VpcConfig — service only calls GitHub API (external), not RDS
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXrayWriteOnlyAccess
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ["secretsmanager:GetSecretValue"]
              Resource: !Ref SecretsArn

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: !Ref LogRetentionInDays

Outputs:
  ApiEndpoint:
    Description: Publisher API Invoke URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
